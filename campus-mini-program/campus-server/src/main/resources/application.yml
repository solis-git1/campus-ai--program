spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_mini?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 262191
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# MyBatis配置
mybatis:
  # 映射文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名
  type-aliases-package: com.campus.entity
  configuration:
    # 开启驼峰命名自动映射
    map-underscore-to-camel-case: true
    # 打印SQL日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 微信小程序配置
wechat:
  appid: your_wechat_appid
  secret: your_wechat_secret

# 日志配置
logging:
  level:
    com.campus: debug
  pattern:
    dateformat: HH:mm:ss

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api



  # 在application.yml中添加以下配置：

  # JWT配置
jwt:
  secret: "3sK9$pR2!zQ7*bN5&dF8@gH1^jL6#kM0"  # 需要设置强密码
  expiration: 86400000  # 24小时
  issuer: "campus-mini-program"

  # 跨域配置
cors:
  allowed-origins: "https://servicewechat.com,http://localhost:8080"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true
